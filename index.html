<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Player Blindagem Local</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        .youtube-box {
            width: 750px;   
            height: 420px;  
            position: relative;
            overflow: hidden; 
            background: #000;
            border: 2px solid #222;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.7);
        }

        iframe { 
            width: 100%; height: 100%; border: none; position: absolute; top: 0px; left: 0px;      
        }

        /* Esconde totalmente o iframe de sacrifício */
        #iframe_sacrificio {
            width: 1px; height: 1px; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="youtube-box">
        <iframe id="iframe_sacrificio" name="_top"></iframe>

        <iframe 
            src="https://www.google.com.br" 
            scrolling="no" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
