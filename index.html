<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Player Inteligente Híbrido Corrigido</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        /* Sua moldura padrão perfeita de 750x420 */
        .youtube-box {
            width: 750px;   
            height: 420px;  
            position: relative;
            overflow: hidden; 
            background: #000;
            border: 2px solid #222;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.7);
        }

        iframe { 
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0px;       
            left: 0px;      
            display: none; /* Só aparece se passar no teste de redirecionamento */
        }

        #status-tela {
            position: absolute;
            color: #333;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="youtube-box" id="player-container">
        <div id="status-tela"></div>
        
        <iframe 
            id="live_stream" 
            scrolling="no" 
            sandbox="allow-scripts allow-same-origin allow-forms" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // COLOQUE O LINK OU A BASE64 AQUI
        var entradaLink = "https://www.google.com.br"; 

        var iframe = document.getElementById('live_stream');

        function processarLink(input) {
            if (!input) return null;
            
            // Remove espaços em branco, quebras de linha e tabulações das pontas
            input = input.trim().replace(/\s/g, '');
            
            // Se já for um link direto válido, usa ele
            if (input.startsWith('http://') || input.startsWith('https://')) {
                return input;
            }
            
            // Tenta decodificar assumindo que é Base64
            try {
                var linkDecodificado = atob(input);
                // Remove possíveis espaços gerados na decodificação
                linkDecodificado = linkDecodificado.trim();
                
                if (linkDecodificado.startsWith('http://') || linkDecodificado.startsWith('https://')) {
                    return linkDecodificado;
                }
            } catch (e) {
                console.log("A entrada não é uma Base64 válida, tratando como texto comum.");
            }
            
            // Se falhar na Base64 mas o input original contiver a estrutura de um link, tenta usá-lo
            if (input.includes('://')) {
                return input;
            }
            
            return null;
        }

        var urlFinal = processarLink(entradaLink);

        if (urlFinal) {
            // Roda a sua validação blindada que deu certo na versão anterior
            fetch(urlFinal, { 
                method: 'GET',
                redirect: 'error' 
            })
            .then(function(response) {
                iframe.src = urlFinal;
                iframe.style.display = 'block';
            })
            .catch(function(err) {
                console.log("Transmissão encerrada ou link inválido.");
                iframe.src = "";
                iframe.style.display = 'none';
            });
        } else {
            iframe.style.display = 'none';
        }
    </script>

</body>
</html>
