<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Player Inteligente Híbrido</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        /* Sua moldura padrão perfeita de 750x420 */
        .youtube-box {
            width: 750px;   
            height: 420px;  
            position: relative;
            overflow: hidden; 
            background: #000;
            border: 2px solid #222;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.7);
        }

        iframe { 
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0px;       
            left: 0px;      
            display: none; /* Só aparece se passar no teste de redirecionamento */
        }

        #status-tela {
            position: absolute;
            color: #333;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="youtube-box" id="player-container">
        <div id="status-tela"></div>
        
        <iframe 
            id="live_stream" 
            scrolling="no" 
            sandbox="allow-scripts allow-same-origin allow-forms" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        /* COLOQUE O LINK AQUI:
          - Pode ser o link normal: "https://www.fctv33hd.mom/..."
          - Ou ele criptografado em Base64: "aHR0cHM6Ly93d3cuZmN0djMzaGQu..."
        */
        var entradaLink = "aHR0cHM6Ly93d3cuZmN0djMzaGQubW9tL2JyL3ZvbGxleWJhbGwvbmF0aW9ucy1sZWFndWUtd29tZW4tbWF0Y2gtMjE4NDUxMS90dXJrZXktd29tZW4tdnMtY2hpbmEtd29tZW4tMDYtMjAyNi5odG1s"; 
        var iframe = document.getElementById('live_stream');
        var statusTela = document.getElementById('status-tela');

        // Função interna para processar e decodificar o link se necessário
        function processarLink(input) {
            input = input.trim();
            
            // Se já começar com http:// ou https://, é um link comum
            if (input.startsWith('http://') || input.startsWith('https://')) {
                return input;
            }
            
            // Caso contrário, tenta decodificar da Base64
            try {
                var linkDecodificado = atob(input);
                if (linkDecodificado.startsWith('http://') || linkDecodificado.startsWith('https://')) {
                    return linkDecodificado;
                }
            } catch (e) {
                console.error("Erro: O texto inserido não é um link válido nem uma Base64 correta.");
            }
            return null;
        }

        // Obtém a URL final resolvida
        var urlFinal = processarLink(entradaLink);

        if (urlFinal) {
            // Roda a sua validação blindada contra o chute do servidor
            fetch(urlFinal, { 
                method: 'GET',
                redirect: 'error' 
            })
            .then(function(response) {
                iframe.src = urlFinal;
                iframe.style.display = 'block';
            })
            .catch(function(err) {
                console.log("Transmissão encerrada ou link inválido.");
                iframe.src = "";
                iframe.style.display = 'none';
            });
        } else {
            // Se a entrada for totalmente inválida, mantém no breu
            iframe.style.display = 'none';
        }
    </script>

</body>
</html>
